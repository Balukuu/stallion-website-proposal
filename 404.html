<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Stallion Insurance Brokers</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: none; -ms-overflow-style: none; } 
    *::-webkit-scrollbar { display: none; }
    ul { list-style: none; padding: 0; margin: 0; }
    :root {
      --primary: #0A2342; --accent: #C9952A;
      --neutral-100: #F7F8FA; --neutral-700: #3D3D3D; --white: #FFFFFF;
      --font-heading: 'Playfair Display', serif; --font-body: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: none; -ms-overflow-style: none; } 
    *::-webkit-scrollbar { display: none; }
    body { font-family: var(--font-body); background: var(--neutral-100); color: var(--neutral-700); height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    .error-container { max-width: 600px; padding: 40px; }
    h1 { font-family: var(--font-heading); font-size: 8rem; color: var(--primary); line-height: 1; margin-bottom: 16px; }
    h2 { font-family: var(--font-heading); font-size: 2rem; color: var(--primary); margin-bottom: 16px; }
    p { font-size: 1.1rem; margin-bottom: 32px; color: var(--neutral-700); }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 16px 32px; background: var(--accent); color: var(--white); font-weight: 600; border-radius: 50px; text-decoration: none; transition: 0.3s; }
    .btn:hover { background: #b58322; transform: translateY(-3px); }
  </style>
  <link rel="icon" type="image/png" href="logo.png">
</head>
<body>

    <a href="index.html" class="btn"><i class="fa-solid fa-house" style="margin-right: 8px;"></i> Return to Homepage</a>
  </div>
</body>
